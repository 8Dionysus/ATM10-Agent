name: Pytest

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest
        run: python -m pytest

  smoke:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Smoke - Phase A (stub)
        run: |
          python scripts/phase_a_smoke.py --vlm-provider stub --runs-dir runs/ci-smoke-phase-a

      - name: Smoke - Retrieval demo (in-memory)
        run: |
          python scripts/retrieve_demo.py --in tests/fixtures/retrieval_docs_sample.jsonl --query "mekanism steel" --topk 3 --candidate-k 10 --reranker none --runs-dir runs/ci-smoke-retrieve

      - name: Smoke - Retrieval eval (fixtures)
        run: |
          python scripts/eval_retrieval.py --docs tests/fixtures/retrieval_docs_sample.jsonl --eval tests/fixtures/retrieval_eval_sample.jsonl --topk 3 --candidate-k 10 --reranker none --runs-dir runs/ci-smoke-eval

      - name: Smoke - Automation dry-run (fixture)
        run: |
          python scripts/automation_dry_run.py --plan-json tests/fixtures/automation_plan_quest_book.json --runs-dir runs/ci-smoke-automation-dry-run

      - name: Validate - Automation dry-run contract
        run: |
          python scripts/check_automation_smoke_contract.py --mode dry_run --runs-dir runs/ci-smoke-automation-dry-run --min-action-count 3 --min-step-count 4 --summary-json runs/ci-smoke-automation-dry-run/contract_summary.json

      - name: Smoke - Automation intent chain (fixture)
        run: |
          python scripts/automation_intent_chain_smoke.py --intent-json tests/fixtures/intent_open_quest_book.json --runs-dir runs/ci-smoke-automation-chain

      - name: Validate - Automation intent chain contract
        run: |
          python scripts/check_automation_smoke_contract.py --mode intent_chain --runs-dir runs/ci-smoke-automation-chain --min-action-count 3 --min-step-count 4 --expected-intent-type open_quest_book --summary-json runs/ci-smoke-automation-chain/contract_summary.json

      - name: Summary - Automation smoke contracts
        shell: pwsh
        run: |
          $dry = Get-Content "runs/ci-smoke-automation-dry-run/contract_summary.json" | ConvertFrom-Json
          $chain = Get-Content "runs/ci-smoke-automation-chain/contract_summary.json" | ConvertFrom-Json
          $runbookUrl = "$env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/blob/$env:GITHUB_REF_NAME/docs/RUNBOOK.md#m68-troubleshooting-automation-smoke-contract-failures-ci"
          $lines = @(
            "## Automation Smoke Contracts",
            "",
            "| mode | status | action_count | step_count | intent_type |",
            "|---|---|---:|---:|---|",
            "| dry_run | $($dry.status) | $($dry.observed.action_count) | $($dry.observed.step_count) | - |",
            "| intent_chain | $($chain.status) | $($chain.observed.action_count) | $($chain.observed.step_count) | $($chain.observed.intent_type) |",
            "",
            "- Troubleshooting: [RUNBOOK M6.8]($runbookUrl)"
          )
          $lines -join "`n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Upload artifact - Automation smoke summaries
        uses: actions/upload-artifact@v4
        with:
          name: automation-smoke-contract-summaries
          path: |
            runs/ci-smoke-automation-dry-run/contract_summary.json
            runs/ci-smoke-automation-chain/contract_summary.json
