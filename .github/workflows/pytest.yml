name: Pytest

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -r requirements-audit.txt

      - name: Report - Dependency audit (report_only)
        run: |
          python scripts/dependency_audit.py --runs-dir runs/ci-dependency-audit --policy report_only --with-security-scan true

      - name: Run pytest
        run: python -m pytest

  smoke:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -r requirements-audit.txt

      - name: Report - Dependency audit (report_only)
        run: |
          python scripts/dependency_audit.py --runs-dir runs/ci-dependency-audit --policy report_only --with-security-scan true

      - name: Smoke - Phase A (stub)
        run: |
          python scripts/phase_a_smoke.py --vlm-provider stub --runs-dir runs/ci-smoke-phase-a

      - name: Validate - Smoke summary (Phase A)
        run: |
          python scripts/collect_smoke_run_summary.py --runs-dir runs/ci-smoke-phase-a --expected-mode phase_a_smoke --summary-json runs/ci-smoke-phase-a/smoke_summary.json

      - name: Smoke - Retrieval demo (in-memory)
        run: |
          python scripts/retrieve_demo.py --in tests/fixtures/retrieval_docs_sample.jsonl --query "mekanism steel" --topk 3 --candidate-k 10 --reranker none --runs-dir runs/ci-smoke-retrieve

      - name: Validate - Smoke summary (Retrieve demo)
        run: |
          python scripts/collect_smoke_run_summary.py --runs-dir runs/ci-smoke-retrieve --expected-mode retrieve_demo --summary-json runs/ci-smoke-retrieve/smoke_summary.json

      - name: Smoke - Retrieval eval (fixtures)
        run: |
          python scripts/eval_retrieval.py --docs tests/fixtures/retrieval_docs_sample.jsonl --eval tests/fixtures/retrieval_eval_sample.jsonl --topk 3 --candidate-k 10 --reranker none --runs-dir runs/ci-smoke-eval

      - name: Validate - Smoke summary (Retrieval eval)
        run: |
          python scripts/collect_smoke_run_summary.py --runs-dir runs/ci-smoke-eval --expected-mode eval_retrieval --summary-json runs/ci-smoke-eval/smoke_summary.json

      - name: Smoke - Automation dry-run (fixture)
        run: |
          python scripts/automation_dry_run.py --plan-json tests/fixtures/automation_plan_quest_book.json --runs-dir runs/ci-smoke-automation-dry-run

      - name: Validate - Automation dry-run contract
        run: |
          python scripts/check_automation_smoke_contract.py --mode dry_run --runs-dir runs/ci-smoke-automation-dry-run --min-action-count 3 --min-step-count 4 --summary-json runs/ci-smoke-automation-dry-run/contract_summary.json

      - name: Smoke - Automation intent chain (fixture)
        run: |
          python scripts/automation_intent_chain_smoke.py --intent-json tests/fixtures/intent_open_quest_book.json --runs-dir runs/ci-smoke-automation-chain

      - name: Validate - Automation intent chain contract
        run: |
          python scripts/check_automation_smoke_contract.py --mode intent_chain --runs-dir runs/ci-smoke-automation-chain --min-action-count 3 --min-step-count 4 --expected-intent-type open_quest_book --require-trace-id --require-intent-id --summary-json runs/ci-smoke-automation-chain/contract_summary.json

      - name: Smoke - Automation intent chain (inventory fixture)
        run: |
          python scripts/automation_intent_chain_smoke.py --intent-json tests/fixtures/intent_check_inventory_tool.json --runs-dir runs/ci-smoke-automation-chain-inventory

      - name: Validate - Automation intent chain contract (inventory fixture)
        run: |
          python scripts/check_automation_smoke_contract.py --mode intent_chain --runs-dir runs/ci-smoke-automation-chain-inventory --min-action-count 3 --min-step-count 4 --expected-intent-type check_inventory_tool --require-trace-id --require-intent-id --summary-json runs/ci-smoke-automation-chain-inventory/contract_summary.json

      - name: Smoke - Gateway v1 (core scenario)
        run: |
          python scripts/gateway_v1_smoke.py --scenario core --runs-dir runs/ci-smoke-gateway-core --summary-json runs/ci-smoke-gateway-core/gateway_smoke_summary.json

      - name: Smoke - Gateway v1 (automation scenario)
        run: |
          python scripts/gateway_v1_smoke.py --scenario automation --runs-dir runs/ci-smoke-gateway-automation --summary-json runs/ci-smoke-gateway-automation/gateway_smoke_summary.json

      - name: Smoke - Gateway v1 HTTP (core scenario)
        run: |
          python scripts/gateway_v1_http_smoke.py --scenario core --runs-dir runs/ci-smoke-gateway-http-core --summary-json runs/ci-smoke-gateway-http-core/gateway_http_smoke_summary.json

      - name: Smoke - Gateway v1 HTTP (automation scenario)
        run: |
          python scripts/gateway_v1_http_smoke.py --scenario automation --runs-dir runs/ci-smoke-gateway-http-automation --summary-json runs/ci-smoke-gateway-http-automation/gateway_http_smoke_summary.json

      - name: Smoke - Gateway SLA check (signal_only)
        run: |
          python scripts/check_gateway_sla.py --http-summary-json runs/ci-smoke-gateway-http-core/gateway_http_smoke_summary.json --summary-json runs/ci-smoke-gateway-sla/gateway_sla_summary.json --profile conservative --policy signal_only --runs-dir runs/ci-smoke-gateway-sla

      - name: Smoke - Gateway SLA trend snapshot
        run: |
          python scripts/gateway_sla_trend_snapshot.py --sla-runs-dir runs/ci-smoke-gateway-sla --history-limit 10 --baseline-window 5 --critical-policy signal_only --runs-dir runs/ci-smoke-gateway-sla-trend

      - name: Resolve - Gateway SLA trend paths
        shell: pwsh
        run: |
          $trendSnapshot = Get-ChildItem -Path "runs/ci-smoke-gateway-sla-trend" -Recurse -Filter "gateway_sla_trend_snapshot.json" | Sort-Object FullName | Select-Object -Last 1
          $trendSummary = Get-ChildItem -Path "runs/ci-smoke-gateway-sla-trend" -Recurse -Filter "summary.md" | Sort-Object FullName | Select-Object -Last 1
          if ($null -eq $trendSnapshot -or $null -eq $trendSummary) {
            throw "gateway SLA trend artifacts not found"
          }
          Add-Content -Path $env:GITHUB_ENV -Value "GATEWAY_SLA_TREND_SNAPSHOT_JSON=$($trendSnapshot.FullName)"
          Add-Content -Path $env:GITHUB_ENV -Value "GATEWAY_SLA_TREND_SUMMARY_MD=$($trendSummary.FullName)"

      - name: Smoke - Streamlit operator panel (no-crash)
        run: |
          python scripts/streamlit_operator_panel_smoke.py --panel-runs-dir runs --runs-dir runs/ci-smoke-streamlit --summary-json runs/ci-smoke-streamlit/streamlit_smoke_summary.json --gateway-url http://127.0.0.1:8770 --startup-timeout-sec 45

      - name: Summary - Core smoke summaries
        shell: pwsh
        run: |
          $phaseA = Get-Content "runs/ci-smoke-phase-a/smoke_summary.json" | ConvertFrom-Json
          $retrieve = Get-Content "runs/ci-smoke-retrieve/smoke_summary.json" | ConvertFrom-Json
          $eval = Get-Content "runs/ci-smoke-eval/smoke_summary.json" | ConvertFrom-Json
          function FmtOpt([object]$value) {
            if ($null -eq $value) { return "-" }
            $text = "$value".Trim()
            if ([string]::IsNullOrEmpty($text)) { return "-" }
            return $text
          }
          $lines = @(
            "## Core Smoke Summaries",
            "",
            "| mode | status | details |",
            "|---|---|---|",
            "| phase_a_smoke | $($phaseA.status) | vlm=$(FmtOpt $phaseA.observed.vlm_resolved), fallback=$(FmtOpt $phaseA.observed.vlm_fallback_used) |",
            "| retrieve_demo | $($retrieve.status) | results_count=$(FmtOpt $retrieve.observed.results_count) |",
            "| eval_retrieval | $($eval.status) | query_count=$(FmtOpt $eval.observed.query_count), mrr=$(FmtOpt $eval.observed.mean_mrr_at_k) |"
          )
          $lines -join "`n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Summary - Gateway smoke summaries
        shell: pwsh
        run: |
          $core = Get-Content "runs/ci-smoke-gateway-core/gateway_smoke_summary.json" | ConvertFrom-Json
          $automation = Get-Content "runs/ci-smoke-gateway-automation/gateway_smoke_summary.json" | ConvertFrom-Json
          $lines = @(
            "## Gateway Smoke Summaries",
            "",
            "| scenario | status | request_count |",
            "|---|---|---:|",
            "| core | $($core.status) | $($core.request_count) |",
            "| automation | $($automation.status) | $($automation.request_count) |"
          )
          $lines -join "`n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Summary - Gateway HTTP smoke summaries
        shell: pwsh
        run: |
          $core = Get-Content "runs/ci-smoke-gateway-http-core/gateway_http_smoke_summary.json" | ConvertFrom-Json
          $automation = Get-Content "runs/ci-smoke-gateway-http-automation/gateway_http_smoke_summary.json" | ConvertFrom-Json
          $lines = @(
            "## Gateway HTTP Smoke Summaries",
            "",
            "| scenario | status | request_count | failed_requests_count |",
            "|---|---|---:|---:|",
            "| core | $($core.status) | $($core.request_count) | $($core.failed_requests_count) |",
            "| automation | $($automation.status) | $($automation.request_count) | $($automation.failed_requests_count) |"
          )
          $lines -join "`n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Summary - Gateway SLA
        shell: pwsh
        run: |
          $sla = Get-Content "runs/ci-smoke-gateway-sla/gateway_sla_summary.json" | ConvertFrom-Json
          $breachesCount = if ($null -eq $sla.breaches) { 0 } else { $sla.breaches.Count }
          $lines = @(
            "## Gateway SLA Summary",
            "",
            "| status | sla_status | request_count | failed_requests_count | error_rate | timeout_rate | latency_p95_ms | breaches_count |",
            "|---|---|---:|---:|---:|---:|---:|---:|",
            "| $($sla.status) | $($sla.sla_status) | $($sla.metrics.request_count) | $($sla.metrics.failed_requests_count) | $($sla.metrics.error_rate) | $($sla.metrics.timeout_rate) | $($sla.metrics.latency_p95_ms) | $breachesCount |"
          )
          $lines -join "`n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Summary - Gateway SLA trend
        shell: pwsh
        run: |
          $trend = Get-Content $env:GATEWAY_SLA_TREND_SNAPSHOT_JSON | ConvertFrom-Json
          $rolling = $trend.rolling_baseline
          $flags = $rolling.regression_flags
          $breach = $trend.breach_drift
          $critical = $trend.critical_policy
          function FmtOpt([object]$value) {
            if ($null -eq $value) { return "-" }
            $text = "$value".Trim()
            if ([string]::IsNullOrEmpty($text)) { return "-" }
            return $text
          }
          $lines = @(
            "## Gateway SLA Trend Summary",
            "",
            "| status | latest_sla_status | baseline_count | error_rate_status | timeout_rate_status | latency_p95_status | breach_rate_status | max_severity | should_fail_nightly |",
            "|---|---|---:|---|---|---|---|---|---|",
            "| $($trend.status) | $(FmtOpt $trend.latest.sla_status) | $(FmtOpt $rolling.count) | $(FmtOpt $flags.error_rate_status) | $(FmtOpt $flags.timeout_rate_status) | $(FmtOpt $flags.latency_p95_status) | $(FmtOpt $breach.breach_rate_status) | $(FmtOpt $flags.max_regression_severity) | $(FmtOpt $critical.should_fail_nightly) |",
            "",
            "- `trend_snapshot_json`: $env:GATEWAY_SLA_TREND_SNAPSHOT_JSON",
            "- `trend_summary_md`: $env:GATEWAY_SLA_TREND_SUMMARY_MD"
          )
          $lines -join "`n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Summary - Streamlit smoke summary
        shell: pwsh
        run: |
          $streamlit = Get-Content "runs/ci-smoke-streamlit/streamlit_smoke_summary.json" | ConvertFrom-Json
          $tabsCount = if ($null -eq $streamlit.tabs_detected) { 0 } else { $streamlit.tabs_detected.Count }
          $missingCount = if ($null -eq $streamlit.missing_sources) { 0 } else { $streamlit.missing_sources.Count }
          $lines = @(
            "## Streamlit Smoke Summary",
            "",
            "| status | startup_ok | tabs_detected_count | missing_sources_count |",
            "|---|---|---:|---:|",
            "| $($streamlit.status) | $($streamlit.startup_ok) | $tabsCount | $missingCount |"
          )
          $lines -join "`n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Summary - Automation smoke contracts
        shell: pwsh
        run: |
          $dry = Get-Content "runs/ci-smoke-automation-dry-run/contract_summary.json" | ConvertFrom-Json
          $chainQuest = Get-Content "runs/ci-smoke-automation-chain/contract_summary.json" | ConvertFrom-Json
          $chainInventory = Get-Content "runs/ci-smoke-automation-chain-inventory/contract_summary.json" | ConvertFrom-Json
          $runbookUrl = python scripts/build_runbook_link.py --anchor "m68-troubleshooting-automation-smoke-contract-failures-ci"
          function FmtOpt([object]$value) {
            if ($null -eq $value) { return "-" }
            $text = "$value".Trim()
            if ([string]::IsNullOrEmpty($text)) { return "-" }
            return $text
          }
          $lines = @(
            "## Automation Smoke Contracts",
            "",
            "| mode | status | action_count | step_count | intent_type | trace_id | intent_id |",
            "|---|---|---:|---:|---|---|---|",
            "| dry_run | $($dry.status) | $($dry.observed.action_count) | $($dry.observed.step_count) | - | $(FmtOpt $dry.observed.trace_id) | $(FmtOpt $dry.observed.intent_id) |",
            "| intent_chain_open_quest_book | $($chainQuest.status) | $($chainQuest.observed.action_count) | $($chainQuest.observed.step_count) | $($chainQuest.observed.intent_type) | $(FmtOpt $chainQuest.observed.trace_id) | $(FmtOpt $chainQuest.observed.intent_id) |",
            "| intent_chain_check_inventory_tool | $($chainInventory.status) | $($chainInventory.observed.action_count) | $($chainInventory.observed.step_count) | $($chainInventory.observed.intent_type) | $(FmtOpt $chainInventory.observed.trace_id) | $(FmtOpt $chainInventory.observed.intent_id) |",
            "",
            "### Quick Links",
            "- Troubleshooting: [RUNBOOK M6.8]($runbookUrl)"
          )
          $lines -join "`n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Upload artifact - Automation smoke summaries
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: smoke-contract-summaries
          path: |
            runs/ci-smoke-phase-a/smoke_summary.json
            runs/ci-smoke-retrieve/smoke_summary.json
            runs/ci-smoke-eval/smoke_summary.json
            runs/ci-smoke-automation-dry-run/contract_summary.json
            runs/ci-smoke-automation-chain/contract_summary.json
            runs/ci-smoke-automation-chain-inventory/contract_summary.json
            runs/ci-smoke-gateway-core/gateway_smoke_summary.json
            runs/ci-smoke-gateway-automation/gateway_smoke_summary.json
            runs/ci-smoke-gateway-http-core/gateway_http_smoke_summary.json
            runs/ci-smoke-gateway-http-automation/gateway_http_smoke_summary.json
            runs/ci-smoke-gateway-sla/gateway_sla_summary.json
            runs/ci-smoke-gateway-sla-trend
            runs/ci-smoke-streamlit/streamlit_smoke_summary.json

      - name: Upload artifact - Dependency audit
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: dependency-audit-report
          path: runs/ci-dependency-audit
