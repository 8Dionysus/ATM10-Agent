name: Gateway SLA Readiness Nightly

on:
  schedule:
    - cron: "35 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gateway_sla_readiness:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Restore cache - Gateway SLA history
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: |
            runs/nightly-gateway-sla-history
            runs/nightly-gateway-sla-trend-history
            runs/nightly-gateway-sla-readiness
            runs/nightly-gateway-sla-governance
            runs/nightly-gateway-sla-progress
            runs/nightly-gateway-sla-transition
            runs/nightly-gateway-sla-remediation
            runs/nightly-gateway-sla-integrity
          key: gateway-sla-history-v1-${{ github.run_id }}
          restore-keys: |
            gateway-sla-history-v1-

      - name: Smoke - Gateway v1 HTTP (core scenario)
        run: |
          python scripts/gateway_v1_http_smoke.py --scenario core --runs-dir runs/nightly-gateway-http-core --summary-json runs/nightly-gateway-http-core/gateway_http_smoke_summary.json

      - name: Smoke - Gateway SLA check (signal_only)
        run: |
          python scripts/check_gateway_sla.py --http-summary-json runs/nightly-gateway-http-core/gateway_http_smoke_summary.json --summary-json runs/nightly-gateway-sla-history/gateway_sla_summary.json --profile conservative --policy signal_only --runs-dir runs/nightly-gateway-sla-history

      - name: Smoke - Gateway SLA trend snapshot (signal_only)
        run: |
          python scripts/gateway_sla_trend_snapshot.py --sla-runs-dir runs/nightly-gateway-sla-history --history-limit 30 --baseline-window 5 --critical-policy signal_only --runs-dir runs/nightly-gateway-sla-trend-history

      - name: Readiness - Gateway SLA fail_nightly (report_only)
        run: |
          python scripts/check_gateway_sla_fail_nightly_readiness.py --trend-runs-dir runs/nightly-gateway-sla-trend-history --history-limit 30 --readiness-window 14 --required-baseline-count 5 --max-warn-ratio 0.20 --policy report_only --runs-dir runs/nightly-gateway-sla-readiness --summary-json runs/nightly-gateway-sla-readiness/readiness_summary.json

      - name: Governance - Gateway SLA fail_nightly go/no-go (report_only)
        run: |
          python scripts/check_gateway_sla_fail_nightly_governance.py --readiness-runs-dir runs/nightly-gateway-sla-readiness --history-limit 60 --required-ready-streak 3 --expected-readiness-window 14 --expected-required-baseline-count 5 --expected-max-warn-ratio 0.20 --policy report_only --runs-dir runs/nightly-gateway-sla-governance --summary-json runs/nightly-gateway-sla-governance/governance_summary.json

      - name: Progress - Gateway SLA fail_nightly decision progress (report_only)
        run: |
          python scripts/check_gateway_sla_fail_nightly_progress.py --readiness-runs-dir runs/nightly-gateway-sla-readiness --governance-runs-dir runs/nightly-gateway-sla-governance --readiness-history-limit 60 --governance-history-limit 60 --expected-readiness-window 14 --expected-required-baseline-count 5 --expected-max-warn-ratio 0.20 --required-ready-streak 3 --policy report_only --runs-dir runs/nightly-gateway-sla-progress --summary-json runs/nightly-gateway-sla-progress/progress_summary.json

      - name: Transition - Gateway SLA fail_nightly switch gate (report_only)
        run: |
          python scripts/check_gateway_sla_fail_nightly_transition.py --readiness-runs-dir runs/nightly-gateway-sla-readiness --governance-runs-dir runs/nightly-gateway-sla-governance --progress-runs-dir runs/nightly-gateway-sla-progress --readiness-history-limit 60 --governance-history-limit 60 --progress-history-limit 60 --expected-readiness-window 14 --expected-required-baseline-count 5 --expected-max-warn-ratio 0.20 --required-ready-streak 3 --policy report_only --runs-dir runs/nightly-gateway-sla-transition --summary-json runs/nightly-gateway-sla-transition/transition_summary.json

      - name: Remediation - Gateway SLA fail_nightly snapshot (report_only)
        if: always()
        run: |
          python scripts/check_gateway_sla_fail_nightly_remediation.py --runs-dir runs --policy report_only --summary-json runs/nightly-gateway-sla-remediation/remediation_summary.json

      - name: Integrity - Gateway SLA fail_nightly invariants (report_only)
        if: always()
        run: |
          python scripts/check_gateway_sla_fail_nightly_integrity.py --runs-dir runs --policy report_only --summary-json runs/nightly-gateway-sla-integrity/integrity_summary.json

      - name: Smoke - Gateway SLA trend snapshot (fail_nightly strict gate)
        run: |
          python scripts/gateway_sla_trend_snapshot.py --sla-runs-dir runs/nightly-gateway-sla-history --history-limit 30 --baseline-window 5 --critical-policy fail_nightly --runs-dir runs/nightly-gateway-sla-trend-history

      - name: Summary - Gateway SLA fail_nightly readiness
        if: always()
        shell: pwsh
        run: |
          $path = "runs/nightly-gateway-sla-readiness/readiness_summary.json"
          if (-not (Test-Path $path)) {
            $lines = @(
              "## Gateway SLA Fail-Nightly Readiness",
              "",
              "| status | readiness_status | window_observed | critical_count | warn_count | warn_ratio |",
              "|---|---|---:|---:|---:|---:|",
              "| missing | - | - | - | - | - |",
              "",
              "- `readiness_summary_json`: $path (missing)"
            )
          } else {
            $readiness = Get-Content $path | ConvertFrom-Json
            $window = $readiness.window_summary
            $criteria = $readiness.criteria
            $lines = @(
              "## Gateway SLA Fail-Nightly Readiness",
              "",
              "| status | readiness_status | window_observed | critical_count | warn_count | warn_ratio |",
              "|---|---|---:|---:|---:|---:|",
              "| $($readiness.status) | $($readiness.readiness_status) | $($criteria.window_observed) | $($window.critical_count) | $($window.warn_count) | $($window.warn_ratio) |",
              "",
              "- `required_baseline_count`: $($criteria.required_baseline_count)",
              "- `max_warn_ratio`: $($criteria.max_warn_ratio)",
              "- `readiness_summary_json`: $path"
            )
          }
          $lines -join "`n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Summary - Gateway SLA fail_nightly governance
        if: always()
        shell: pwsh
        run: |
          $path = "runs/nightly-gateway-sla-governance/governance_summary.json"
          if (-not (Test-Path $path)) {
            $lines = @(
              "## Gateway SLA Fail-Nightly Governance",
              "",
              "| status | decision_status | latest_ready_streak | required_ready_streak |",
              "|---|---|---:|---:|",
              "| missing | - | - | - |",
              "",
              "- `governance_summary_json`: $path (missing)"
            )
          } else {
            $governance = Get-Content $path | ConvertFrom-Json
            $criteria = $governance.criteria
            $observed = $governance.observed
            $lines = @(
              "## Gateway SLA Fail-Nightly Governance",
              "",
              "| status | decision_status | latest_ready_streak | required_ready_streak |",
              "|---|---|---:|---:|",
              "| $($governance.status) | $($governance.decision_status) | $($observed.latest_ready_streak) | $($criteria.required_ready_streak) |",
              "",
              "- `governance_summary_json`: $path"
            )
          }
          $lines -join "`n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Summary - Gateway SLA fail_nightly progress
        if: always()
        shell: pwsh
        run: |
          $path = "runs/nightly-gateway-sla-progress/progress_summary.json"
          if (-not (Test-Path $path)) {
            $lines = @(
              "## Gateway SLA Fail-Nightly Progress",
              "",
              "| status | decision_status | remaining_for_window | remaining_for_streak |",
              "|---|---|---:|---:|",
              "| missing | - | - | - |",
              "",
              "- `progress_summary_json`: $path (missing)"
            )
          } else {
            $progress = Get-Content $path | ConvertFrom-Json
            $ready = $progress.observed.readiness
            $lines = @(
              "## Gateway SLA Fail-Nightly Progress",
              "",
              "| status | decision_status | remaining_for_window | remaining_for_streak |",
              "|---|---|---:|---:|",
              "| $($progress.status) | $($progress.decision_status) | $($ready.remaining_for_window) | $($ready.remaining_for_streak) |",
              "",
              "- `progress_summary_json`: $path"
            )
          }
          $lines -join "`n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Summary - Gateway SLA fail_nightly transition
        if: always()
        shell: pwsh
        run: |
          $path = "runs/nightly-gateway-sla-transition/transition_summary.json"
          if (-not (Test-Path $path)) {
            $lines = @(
              "## Gateway SLA Fail-Nightly Transition",
              "",
              "| status | decision_status | strict_gate_policy | summary_json |",
              "|---|---|---|---|",
              "| missing | - | fail_nightly | $path (missing) |",
              "",
              "- `strict_gate_executed`: true"
            )
          } else {
            $transition = Get-Content $path | ConvertFrom-Json
            $lines = @(
              "## Gateway SLA Fail-Nightly Transition",
              "",
              "| status | decision_status | strict_gate_policy | summary_json |",
              "|---|---|---|---|",
              "| $($transition.status) | $($transition.decision_status) | fail_nightly | $path |",
              "",
              "- `strict_gate_executed`: true"
            )
          }
          $lines -join "`n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Summary - Gateway SLA fail_nightly remediation
        if: always()
        shell: pwsh
        run: |
          $path = "runs/nightly-gateway-sla-remediation/remediation_summary.json"
          if (-not (Test-Path $path)) {
            $lines = @(
              "## Gateway SLA Fail-Nightly Remediation",
              "",
              "| status | candidate_item_count | summary_json |",
              "|---|---:|---|",
              "| missing | 0 | $path (missing) |",
              "",
              "- remediation backlog not available because the summary artifact is missing"
            )
          } else {
            $remediation = Get-Content $path | ConvertFrom-Json
            $candidateItems = @($remediation.candidate_items)
            $backlogNote = if ($candidateItems.Count -eq 0) {
              "- remediation backlog is not required for this nightly snapshot"
            } else {
              "- remediation backlog details are available in the uploaded artifact bundle"
            }
            $lines = @(
              "## Gateway SLA Fail-Nightly Remediation",
              "",
              "| status | candidate_item_count | summary_json |",
              "|---|---:|---|",
              "| $($remediation.status) | $($candidateItems.Count) | $path |",
              "",
              $backlogNote
            )
          }
          $lines -join "`n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Summary - Gateway SLA fail_nightly integrity
        if: always()
        shell: pwsh
        run: |
          $path = "runs/nightly-gateway-sla-integrity/integrity_summary.json"
          if (-not (Test-Path $path)) {
            $lines = @(
              "## Gateway SLA Fail-Nightly Integrity",
              "",
              "| status | integrity_status | summary_json |",
              "|---|---|---|",
              "| missing | - | $path (missing) |"
            )
          } else {
            $integrity = Get-Content $path | ConvertFrom-Json
            $decision = $integrity.decision
            $lines = @(
              "## Gateway SLA Fail-Nightly Integrity",
              "",
              "| status | integrity_status | summary_json |",
              "|---|---|---|",
              "| $($integrity.status) | $($decision.integrity_status) | $path |"
            )
          }
          $lines -join "`n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Save cache - Gateway SLA history
        if: always()
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: |
            runs/nightly-gateway-sla-history
            runs/nightly-gateway-sla-trend-history
            runs/nightly-gateway-sla-readiness
            runs/nightly-gateway-sla-governance
            runs/nightly-gateway-sla-progress
            runs/nightly-gateway-sla-transition
            runs/nightly-gateway-sla-remediation
            runs/nightly-gateway-sla-integrity
          key: gateway-sla-history-v1-${{ github.run_id }}

      - name: Upload artifact - Gateway SLA readiness nightly runs
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: gateway-sla-readiness-nightly-runs
          path: |
            runs/nightly-gateway-http-core/gateway_http_smoke_summary.json
            runs/nightly-gateway-sla-history/gateway_sla_summary.json
            runs/nightly-gateway-sla-history/**/gateway_sla_summary.json
            runs/nightly-gateway-sla-trend-history/**/gateway_sla_trend_snapshot.json
            runs/nightly-gateway-sla-trend-history/**/summary.md
            runs/nightly-gateway-sla-readiness/readiness_summary.json
            runs/nightly-gateway-sla-readiness/**/readiness_summary.json
            runs/nightly-gateway-sla-governance/governance_summary.json
            runs/nightly-gateway-sla-governance/**/governance_summary.json
            runs/nightly-gateway-sla-progress/progress_summary.json
            runs/nightly-gateway-sla-progress/**/progress_summary.json
            runs/nightly-gateway-sla-transition/transition_summary.json
            runs/nightly-gateway-sla-transition/**/transition_summary.json
            runs/nightly-gateway-sla-remediation/remediation_summary.json
            runs/nightly-gateway-sla-remediation/**/remediation_summary.json
            runs/nightly-gateway-sla-integrity/integrity_summary.json
            runs/nightly-gateway-sla-integrity/**/integrity_summary.json
