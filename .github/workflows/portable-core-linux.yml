name: Portable Core Linux

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  portable_core_linux:
    name: Portable core Linux smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install Linux development dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-linux-dev.txt

      - name: Run portable-core Linux tests
        run: |
          python -m pytest -q \
            tests/test_host_profiles.py \
            tests/test_atm10_session_probe_adapters.py \
            tests/test_readiness_scopes.py \
            tests/test_discover_instance.py \
            tests/test_start_operator_fedora_dev.py \
            tests/test_fedora_companion_milestone.py \
            tests/test_windows_product_edge_contract.py \
            tests/test_portable_core_linux_workflow.py

      - name: Smoke - Instance discovery artifact
        run: |
          python scripts/discover_instance.py --runs-dir runs/ci-linux-discover-instance

      - name: Smoke - Fedora startup wrapper print-only
        run: |
          python scripts/start_operator_fedora_dev.py \
            --print-only \
            --runs-dir runs/ci-fedora-startup-print-only \
            --no-voice-runtime \
            --no-tts-runtime \
            -- \
            --pilot-vlm-provider stub

      - name: Smoke - Fedora companion milestone receipt
        run: |
          python scripts/write_fedora_companion_receipt.py \
            --runs-dir runs/ci-fedora-companion-receipt \
            --capture-region 0,0,1920,1080 \
            --allow-missing-atm10-dir \
            -- \
            --pilot-vlm-provider stub \
            --pilot-text-provider stub
