name: Security Nightly

on:
  schedule:
    - cron: "45 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency_security_audit:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -r requirements-audit.txt

      - name: Security gate - Dependency audit (fail_on_critical)
        run: |
          python scripts/dependency_audit.py --runs-dir runs/nightly-security-audit --policy fail_on_critical --with-security-scan true

      - name: Upload artifact - Security nightly report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: security-nightly-report
          path: |
            runs/nightly-security-audit/**/run.json
            runs/nightly-security-audit/**/dependency_inventory.json
            runs/nightly-security-audit/**/dependency_findings.json
            runs/nightly-security-audit/**/security_audit.json
            runs/nightly-security-audit/**/summary.md
