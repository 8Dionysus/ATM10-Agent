name: Security Nightly

on:
  schedule:
    - cron: "45 2 * * *"
  workflow_dispatch:

jobs:
  dependency_security_audit:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -r requirements-audit.txt

      - name: Security gate - Dependency audit (fail_on_critical)
        run: |
          python scripts/dependency_audit.py --runs-dir runs/nightly-security-audit --policy fail_on_critical --with-security-scan true

      - name: Upload artifact - Security nightly report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: security-nightly-report
          path: runs/nightly-security-audit
